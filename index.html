<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>過去問道場 — Oracle Bronze SQL基礎</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --indigo:#1d2f4f;
    --indigo-deep:#0f1c30;
    --indigo-mid:#28436b;
    --washi:#f7f2e7;
    --washi-dark:#ece2c9;
    --sumi:#231f1c;
    --sumi-soft:#514a41;
    --hanko:#b8382f;
    --hanko-dark:#8c2b23;
    --gold:#c9a24b;
    --gold-soft:#e3c583;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 10%, rgba(201,162,75,0.08), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(201,162,75,0.06), transparent 45%),
      repeating-linear-gradient(115deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 5px),
      linear-gradient(180deg, var(--indigo-deep), var(--indigo) 60%, var(--indigo-deep));
    font-family:'Zen Kaku Gothic New', sans-serif;
    color:var(--washi);
    display:flex;
    justify-content:center;
    padding:32px 16px 64px;
  }
  #app{width:100%; max-width:720px;}

  .brand{ text-align:center; margin-bottom:28px; }
  .brand .kanji{
    font-family:'Shippori Mincho', serif;
    font-weight:800;
    font-size:2.4rem;
    letter-spacing:0.08em;
    background:linear-gradient(180deg, var(--gold-soft), var(--gold));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    margin:0;
  }
  .brand .sub{
    font-family:'JetBrains Mono', monospace;
    font-size:0.78rem;
    letter-spacing:0.15em;
    color:var(--gold-soft);
    opacity:0.85;
    margin-top:4px;
  }
  .brand hr{
    border:none; height:1px;
    width:120px; margin:14px auto 0;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .card{
    background:
      radial-gradient(circle at 90% 8%, rgba(184,56,47,0.05), transparent 35%),
      var(--washi);
    color:var(--sumi);
    border-radius:6px;
    padding:32px 30px;
    position:relative;
    box-shadow:0 18px 40px rgba(0,0,0,0.35), 0 2px 0 rgba(0,0,0,0.15);
    border:1px solid var(--washi-dark);
    overflow:hidden;
  }
  .card::before{
    content:'';
    position:absolute; inset:8px;
    border:1px solid rgba(184,56,47,0.15);
    pointer-events:none;
    border-radius:3px;
  }

  .start-copy{ font-size:0.95rem; line-height:1.9; color:var(--sumi-soft); }
  .start-copy b{ color:var(--sumi); }
  .mode-row{ display:flex; gap:10px; margin:22px 0 8px; flex-wrap:wrap;}
  .mode-btn{
    flex:1; min-width:130px;
    border:1.5px solid var(--indigo-mid);
    background:transparent;
    color:var(--indigo);
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:700;
    padding:12px 10px;
    border-radius:5px;
    cursor:pointer;
    font-size:0.88rem;
    transition:all .15s ease;
  }
  .mode-btn.active{
    background:var(--indigo);
    color:var(--washi);
    box-shadow:0 3px 0 var(--indigo-deep);
  }
  .start-btn{
    width:100%;
    margin-top:22px;
    padding:16px;
    border:none;
    border-radius:5px;
    background:linear-gradient(180deg, var(--hanko), var(--hanko-dark));
    color:#fff;
    font-family:'Shippori Mincho', serif;
    font-weight:700;
    font-size:1.15rem;
    letter-spacing:0.12em;
    cursor:pointer;
    box-shadow:0 4px 0 #6c1c17, 0 10px 20px rgba(184,56,47,0.3);
  }
  .start-btn:active{ transform:translateY(2px); box-shadow:0 2px 0 #6c1c17; }

  .progress-wrap{ display:flex; align-items:center; gap:12px; margin-bottom:18px; }
  .progress-track{
    flex:1; height:8px; border-radius:4px;
    background:rgba(255,255,255,0.12);
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--gold-soft), var(--gold));
    transition:width .3s ease;
  }
  .progress-num{
    font-family:'JetBrains Mono', monospace;
    font-size:0.8rem;
    color:var(--gold-soft);
    white-space:nowrap;
  }

  .qcat{
    display:inline-block;
    font-family:'JetBrains Mono', monospace;
    font-size:0.7rem;
    letter-spacing:0.05em;
    color:var(--hanko-dark);
    background:rgba(184,56,47,0.08);
    border:1px solid rgba(184,56,47,0.25);
    padding:3px 9px;
    border-radius:20px;
    margin-bottom:12px;
  }
  .qtitle{
    font-size:1.05rem;
    font-weight:700;
    line-height:1.75;
    margin:0 0 14px;
    white-space:pre-wrap;
  }
  .qtable-wrap{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    margin:0 0 16px;
  }
  .qtable{
    width:100%;
    border-collapse:collapse;
    margin:0;
    font-family:'JetBrains Mono', monospace;
    font-size:0.78rem;
  }
  .qtable th,.qtable td{
    border:1px solid var(--washi-dark);
    padding:6px 10px;
    text-align:center;
  }
  .qtable th{ background:rgba(29,47,79,0.06); color:var(--indigo);}
  .qcode{
    background:var(--sumi);
    color:#d9e6d0;
    font-family:'JetBrains Mono', monospace;
    font-size:0.82rem;
    line-height:1.6;
    padding:16px 18px;
    border-radius:5px;
    overflow-x:auto;
    margin:0 0 18px;
    white-space:pre;
  }
  .options{ display:flex; flex-direction:column; gap:10px; margin-bottom:22px;}
  .opt{
    display:flex; align-items:flex-start; gap:10px;
    border:1.5px solid var(--washi-dark);
    border-radius:5px;
    padding:12px 14px;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
    font-size:0.92rem;
    line-height:1.55;
  }
  .opt:hover{ border-color:var(--indigo-mid); background:rgba(29,47,79,0.03);}
  .opt.selected{ border-color:var(--indigo); background:rgba(29,47,79,0.06);}
  .opt input{ margin-top:3px; accent-color:var(--indigo); flex-shrink:0;}
  .opt .k{ font-family:'JetBrains Mono', monospace; font-weight:700; color:var(--indigo); margin-right:2px;}
  .opt .opt-body{ flex:1; }

  .opt.correct{ border-color:var(--gold); background:rgba(201,162,75,0.13); cursor:default;}
  .opt.wrong{ border-color:var(--hanko); background:rgba(184,56,47,0.08); cursor:default;}
  .opt.answered{ cursor:default; }
  .opt.answered:hover{ border-color:var(--washi-dark); background:transparent; }
  .opt.correct:hover{ border-color:var(--gold); background:rgba(201,162,75,0.13);}
  .opt.wrong:hover{ border-color:var(--hanko); background:rgba(184,56,47,0.08);}

  .opt-exp{
    display:block;
    margin-top:7px;
    padding-top:7px;
    border-top:1px dashed rgba(81,74,65,0.25);
    font-size:0.8rem;
    line-height:1.7;
    color:var(--sumi-soft);
    font-weight:400;
  }
  .opt.correct .opt-exp{ color:#7a6320; }
  .opt-exp b.judge-ok{ color:#8a6d1f; }
  .opt-exp b.judge-ng{ color:var(--hanko-dark); }

  .actions{ display:flex; gap:10px; }
  .btn{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:700;
    font-size:0.95rem;
    padding:13px 20px;
    border-radius:5px;
    border:none;
    cursor:pointer;
  }
  .btn-primary{
    flex:1;
    background:var(--indigo);
    color:var(--washi);
    box-shadow:0 3px 0 var(--indigo-deep);
  }
  .btn-primary:disabled{ opacity:0.35; cursor:not-allowed; box-shadow:none;}
  .btn-primary:active:not(:disabled){ transform:translateY(2px); box-shadow:none;}
  .btn-ghost{
    background:transparent;
    border:1.5px solid var(--washi-dark);
    color:var(--sumi-soft);
  }

  .explain{
    margin:0 0 18px;
    padding:16px 16px 16px 18px;
    background:rgba(29,47,79,0.045);
    border-left:3px solid var(--indigo);
    border-radius:0 5px 5px 0;
    font-size:0.86rem;
    line-height:1.85;
    color:var(--sumi-soft);
    white-space:pre-wrap;
  }
  .explain b{ color:var(--sumi); }
  .explain .exp-label{
    display:block;
    font-family:'Shippori Mincho', serif;
    font-weight:700;
    color:var(--indigo);
    margin-bottom:4px;
    letter-spacing:0.08em;
  }

  .stamp{
    position:absolute; top:22px; right:26px;
    width:84px; height:84px;
    border-radius:50%;
    border:4px double var(--hanko);
    color:var(--hanko);
    display:flex; align-items:center; justify-content:center;
    font-family:'Shippori Mincho', serif;
    font-size:1.7rem; font-weight:800;
    transform:rotate(-13deg) scale(2.2);
    opacity:0;
    animation:stampIn .4s cubic-bezier(.2,1.5,.4,1) forwards;
    pointer-events:none;
    z-index:2;
  }
  .stamp.ok{ border-color:var(--gold); color:var(--gold);}
  @keyframes stampIn{
    0%{ transform:rotate(-13deg) scale(2.4); opacity:0;}
    55%{ opacity:1;}
    100%{ transform:rotate(-13deg) scale(1); opacity:1;}
  }

  .belt-wrap{ text-align:center; margin:6px 0 24px;}
  .belt-badge{
    display:inline-block;
    font-family:'Shippori Mincho', serif;
    font-weight:800;
    font-size:1.5rem;
    padding:10px 28px;
    border-radius:30px;
    letter-spacing:0.1em;
  }
  .score-line{
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    color:var(--sumi-soft);
    margin-bottom:6px;
  }
  .score-big{
    text-align:center;
    font-family:'Shippori Mincho', serif;
    font-size:2.6rem;
    font-weight:800;
    color:var(--indigo);
    margin:0 0 4px;
  }
  .cat-list{ margin-top:24px; }
  .cat-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:9px 4px;
    border-bottom:1px solid var(--washi-dark);
    font-size:0.85rem;
  }
  .cat-row .bar{
    flex:1; height:6px; margin:0 12px; border-radius:3px;
    background:var(--washi-dark); position:relative; overflow:hidden;
  }
  .cat-row .bar i{
    position:absolute; left:0; top:0; bottom:0;
    background:var(--indigo); border-radius:3px;
  }
  .miss-list{ margin-top:22px; }
  .miss-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 12px;
    border:1px solid var(--washi-dark);
    border-radius:5px;
    margin-bottom:8px;
    font-size:0.85rem;
    cursor:pointer;
  }
  .miss-item:hover{ border-color:var(--hanko); }
  .miss-item span.q{ font-family:'JetBrains Mono', monospace; color:var(--hanko-dark); font-weight:700;}

  .footer-note{
    text-align:center;
    font-size:0.72rem;
    color:rgba(247,242,231,0.4);
    margin-top:22px;
    letter-spacing:0.05em;
  }

  /* ===================== MOBILE ===================== */
  @media (max-width:600px){
    body{ padding:16px 10px 48px; }
    .brand{ margin-bottom:18px; }
    .brand .kanji{ font-size:1.7rem; }
    .brand .sub{ font-size:0.62rem; letter-spacing:0.1em; }
    .brand hr{ margin-top:10px; }

    .card{ padding:20px 16px; }
    .card::before{ inset:6px; }

    .qtitle{ font-size:0.95rem; line-height:1.7; }
    .qtable{ font-size:0.68rem; }
    .qtable th,.qtable td{ padding:5px 7px; }
    .qcode{ font-size:0.74rem; padding:12px 12px; }

    .opt{ padding:11px 11px; font-size:0.86rem; gap:8px; }
    .opt-exp{ font-size:0.76rem; }
    .explain{ font-size:0.8rem; padding:13px 12px 13px 14px; }

    .stamp{
      top:14px; right:14px;
      width:60px; height:60px;
      font-size:1.2rem;
      border-width:3px;
    }

    .actions{ flex-wrap:wrap; }
    .btn{ padding:12px 16px; font-size:0.9rem; }
    .btn-primary{ flex:1 1 100%; }
    .btn-ghost{ flex:1 1 100%; }

    .mode-btn{ min-width:0; flex:1 1 45%; }
    .start-btn{ font-size:1.05rem; padding:14px; }
    .start-copy{ font-size:0.88rem; line-height:1.8; }

    .score-big{ font-size:2rem; }
    .belt-badge{ font-size:1.15rem; padding:8px 20px; }
    .cat-row{ font-size:0.78rem; }
    .miss-item{ font-size:0.78rem; padding:9px 10px; gap:8px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ===================== DATA =====================
   各選択肢: k=記号, t=本文, e=個別解説
   q.explain = 冒頭のポイント解説
================================================== */
const QUESTIONS = [
{id:1, cat:"集合演算", type:"single",
 text:"集合演算子の説明として、正しいものはどれですか。",
 explain:"集合演算子は2つの問合せ結果を組み合わせる演算です。UNION(和・重複排除)、UNION ALL(和・重複あり)、INTERSECT(積=共通部分)、MINUS(差=1つ目−2つ目)の4つの動きを正確に区別できるかがポイントです。",
 options:[
  {k:"A", t:"UNIONは2つの問合せの結果を重複行も含めて表示する",
   e:"UNIONは重複行を排除して表示します。重複を含めて表示するのはUNION ALLです。"},
  {k:"B", t:"UNION ALLは2つの問合せの結果から重複行を排除して表示する",
   e:"UNION ALLは重複行を排除しません。説明がUNIONと逆になっています。"},
  {k:"C", t:"INTERSECTは2つの問合せの結果の共通する行を表示する",
   e:"正しい。INTERSECTは両方の結果に共通して存在する行のみを表示します。"},
  {k:"D", t:"MINUSは2つ目の問合せ結果から1つ目の問合せ結果にない行を表示する",
   e:"MINUSは「1つ目の結果から2つ目に存在する行を除いたもの」です。説明の向きが逆です。"}
 ], correct:["C"]},

{id:2, cat:"DML/DDL分類", type:"multi",
 text:"次の中からDMLでないSQLをすべて選びなさい(5件まで)",
 explain:"SQLは大きくDML(データ操作)・DDL(データ定義)・TCL(トランザクション制御)などに分類されます。DMLはSELECT / INSERT / UPDATE / DELETEの4つと覚えるのが確実です。",
 options:[
  {k:"A", t:"CREATE TABLE",
   e:"表を定義する命令なのでDDL(データ定義言語)です。DMLではありません。"},
  {k:"B", t:"ROLLBACK",
   e:"トランザクションを取り消す命令なのでTCL(トランザクション制御言語)です。DMLではありません。"},
  {k:"C", t:"COMMIT",
   e:"トランザクションを確定する命令なのでTCLです。DMLではありません。"},
  {k:"D", t:"INSERT",
   e:"データを追加するDMLです。「DMLでないもの」を選ぶ問題なので不正解の選択肢です。"},
  {k:"E", t:"DELETE",
   e:"データを削除するDMLです。こちらも「DMLでないもの」には該当しません。"}
 ], correct:["A","B","C"]},

{id:3, cat:"NULL処理", type:"single",
 text:"EMPLOYEES表のCOMMISSION列がNULL値でない従業員を検索する条件として、正しいものはどれですか。",
 explain:"NULLは「値が存在しない」状態であり、= や <> などの比較演算子では判定できません(結果が常に不明になる)。NULL判定は IS NULL / IS NOT NULL 専用構文を使います。",
 options:[
  {k:"A", t:"WHERE commission != NULL",
   e:"!=でNULLと比較すると結果は常に不明(偽扱い)になり、1行もヒットしません。"},
  {k:"B", t:"WHERE commission <> NULL",
   e:"<>も同様にNULLとの比較は常に不明になるため使えません。"},
  {k:"C", t:"WHERE commission IS NOT NULL",
   e:"正しい。NULLでないことの判定は IS NOT NULL を使います。"},
  {k:"D", t:"WHERE commission <> 0",
   e:"0とNULLは別物です。この条件ではNULL行は除外されますが、0の行も除外されてしまい意図と異なります。"}
 ], correct:["C"]},

{id:4, cat:"実行順序/優先順位", type:"multi",
 text:"次のSQL文の実行結果として表示される行の組合せとして、正しいものはどれですか(該当するものを全て選択)。\n※ 選択肢A〜Eはそれぞれ下表の行C・E・B・A・Dに対応します。",
 table:{headers:["行","DEPT_ID","SALARY","COMMISSION","HIREDATE"],
   rows:[["A","5","500000","2000000","01-10-01"],["B","1","350000","800000","11-04-01"],
         ["C","4","200000","800000","10-04-01"],["D","3","500000","2000000","01-10-01"],
         ["E","3","400000","1200000","02-12-01"]]},
 code:"SELECT department_id, salary, commission, hiredate\nFROM employees\nWHERE (department_id = 3\nOR salary > 400000)\nAND commission <= 1200000\nOR hiredate > '2008-04-01';",
 explain:"ANDはORより優先順位が高いため、条件は実質\n[(dept=3 OR salary>400000) AND commission<=1200000] OR [hiredate>'2008-04-01']\nという構造になります。前半のANDブロックか、hiredate条件のどちらかを満たせば表示されます。",
 options:[
  {k:"A", t:"行C (DEPT=4, SAL=200000, COMM=800000, 10-04-01)",
   e:"該当する。前半は不成立(dept≠3かつsalary≤400000)ですが、hiredate 2010-04-01 > 2008-04-01 で後半条件を満たします。"},
  {k:"B", t:"行E (DEPT=3, SAL=400000, COMM=1200000, 02-12-01)",
   e:"該当する。dept=3で前半のOR成立、commission=1200000は「以下」に含まれるためAND全体が真になります。"},
  {k:"C", t:"行B (DEPT=1, SAL=350000, COMM=800000, 11-04-01)",
   e:"該当する。前半は不成立ですが、hiredate 2011-04-01 > 2008-04-01 で後半条件を満たします。"},
  {k:"D", t:"行A (DEPT=5, SAL=500000, COMM=2000000, 01-10-01)",
   e:"該当しない。salary>400000で前半のORは成立しますが、commission 2000000 が1200000を超えるためAND不成立。hiredate 2001年も条件を満たしません。"},
  {k:"E", t:"行D (DEPT=3, SAL=500000, COMM=2000000, 01-10-01)",
   e:"該当しない。dept=3ですがcommissionが1200000を超えるためAND不成立。hiredateも2001年で条件を満たしません。"}
 ], correct:["A","B","C"]},

{id:5, cat:"SELECT機能", type:"single",
 text:"SELECT文の機能に関する説明として誤っているものを選びなさい",
 explain:"SELECT文の3大機能は「射影(列を絞る)」「選択(行を絞る)」「結合(複数表をつなぐ)」です。射影と選択の説明を入れ替えた選択肢が定番の引っ掛けです。",
 options:[
  {k:"A", t:"結合とは複数の表から必要な表を求める機能である",
   e:"正しい説明です。結合(JOIN)は複数の表を関連付けて1つの結果を得る機能です。"},
  {k:"B", t:"射影とは、表内の列を選択する機能であり、各種条件を指定できる",
   e:"誤り(=正解)。射影は列を絞るだけの機能で、条件指定は伴いません。「各種条件を指定できる」のは選択(行の絞り込み)の説明です。"},
  {k:"C", t:"選択とは、表内の行を選択するための機能である",
   e:"正しい説明です。WHERE句による行の絞り込みが選択です。"},
  {k:"D", t:"SELECT文を使用して、射影、選択、結合などの実行ができる",
   e:"正しい説明です。SELECT文1つで3機能すべてを組み合わせて実行できます。"}
 ], correct:["B"]},

{id:6, cat:"NOT IN", type:"single",
 text:"従業員がALLEN,FORD,SALLY,TONYの4人だった場合。以下のSQL文を実行して出力されるのはどれですか。",
 code:"SELECT EMPNO,ENAME\nFROM EMP\nWHERE ENAME NOT IN('FORD','SALLY');",
 explain:"NOT INはリストに含まれる値を除外する条件です。IN('FORD','SALLY')の否定なので、FORDとSALLY以外が出力されます。",
 options:[
  {k:"A", t:"FORDとSALLY",
   e:"NOT INは除外の条件なので、リストに含まれる2人はむしろ出力されません。INと逆に読んでしまうと選びがちな引っ掛けです。"},
  {k:"B", t:"全員出力される",
   e:"FORDとSALLYは条件により除外されるため、全員は出力されません。"},
  {k:"C", t:"ALLENとTONY",
   e:"正しい。FORDとSALLYを除外した残りのALLENとTONYが出力されます。"},
  {k:"D", t:"だれの情報も出力されない",

{id:7, cat:"NULL処理", type:"multi",
 text:"月給(SAL列)の値が1600である行を抽出しない設定をすべて選びなさい(4件まで)",
 explain:"「1600を抽出しない=1600の行が結果に含まれない条件」を選ぶ問題です。各条件に sal=1600 を代入して真偽を確かめるのが確実です。",

  {k:"C", t:"WHERE sal NOT BETWEEN 1600 AND 2000",
   e:"正しい。BETWEENは両端(1600と2000)を含むため、NOT BETWEENでは1600は範囲内として除外されます。"},
  {k:"D", t:"WHERE sal >= 1600",

 ], correct:["B","C"]},

{id:8, cat:"文法規則", type:"single",

  {k:"B", t:"キーワードは短縮したり、2行に分割したりすることはできない",
   e:"正しい規則です。SELECTをSELなどと短縮したり、途中で改行を挟むことはできません。"},
  {k:"C", t:"SQLは1行または複数行で記述できる",

  {k:"D", t:"算術演算子の優先順位を変更するためにはカッコを使用する",
   e:"正しい規則です。(a+b)*c のようにカッコで優先順位を制御します。"}
 ], correct:["A"]},

{id:9, cat:"SELECT機能", type:"single",

{id:10, cat:"射影/選択", type:"single",

{id:11, cat:"DISTINCT", type:"single",
 text:"商品を購入した顧客を把握するために、SALES表のCUST_ID列(顧客ID)の値の重複を排除して取り出すには、どのSQL文を実行しますか。",
 explain:"DISTINCTは重複行を排除するキーワードで、置き場所はSELECTの直後と決まっています。位置を変えた誤答が並ぶ典型的な構文問題です。",
 options:[
  {k:"A", t:"SELECT DISTINCT cust_id FROM sales;",
   e:"正しい。DISTINCTはSELECT直後に置きます。実データに適用すると顧客IDは1001・1002・1003の3件に重複排除されます。"},
  {k:"B", t:"SELECT cust_id FROM DISTINCT sales;",
   e:"FROM句の後(表名の前)にDISTINCTは置けません。構文エラーになります。"},
  {k:"C", t:"SELECT cust_id DISTINCT FROM sales;",
   e:"列名の後にDISTINCTは置けません。構文エラーになります。"},
  {k:"D", t:"SELECT cust_id FROM sales;",
   e:"構文としては正しいものの、重複が排除されず同じ顧客IDが複数行表示されてしまいます。"}
 ], correct:["A"]},

{id:12, cat:"IN条件", type:"multi",
 text:"EMPLOYEES表のDEPARTMENT_IDには1〜5の値が登録されています。DEPARTMENT_IDが1,2,3の従業員がヒットする条件として正しいものはどれですか(全て選択、6件まで)。",
 explain:"IN条件の言い換えパターンを問う問題です。IN(1,2,3)=「=1 OR =2 OR =3」であること、値の範囲が1〜5に限定されている前提を活かせるかがポイントです。",
 options:[
  {k:"A", t:"WHERE department_id IN (1, 2, 3)",
   e:"正しい。INはリスト内のいずれかと一致すれば真になります。"},
  {k:"B", t:"WHERE department_id = 1 AND department_id = 2 AND department_id = 3",
   e:"1つの列が同時に1かつ2かつ3になることはあり得ないため、常に偽で1行もヒットしません。"},
  {k:"C", t:"WHERE department_id = 1 OR 2 OR 3",
   e:"「OR 2」のように数値だけを条件として書くことはできず、構文エラーになります。=は各条件に毎回必要です。"},
  {k:"D", t:"WHERE department_id IN (4, 5)",
   e:"4と5の従業員がヒットしてしまい、求める条件と逆です。"},
  {k:"E", t:"WHERE department_id = 1 OR department_id = 2 OR department_id = 3",
   e:"正しい。INを使わずORで書き下した形で、Aと完全に同義です。"},
  {k:"F", t:"WHERE department_id NOT IN (4, 5)",
   e:"正しい。値が1〜5に限られているため、4と5を除外すれば残りは1,2,3になります。※値の範囲が前提にない場合は使えない点に注意。"}
 ], correct:["A","E","F"]},

{id:13, cat:"NULL処理", type:"single",
 text:"employees表のcomm列には[100,200,NULL,180]の値がそれぞれ登録されています。以下のSQL文を実行すると何行の列が検索されますか。",
 code:"SELECT * FROM employees WHERE comm <> 200;",
 explain:"NULLとの比較(NULL <> 200)は真にも偽にもならず「不明」となり、WHERE句では偽と同じ扱いで除外されます。<>200で消えるのは200だけではなくNULL行も、という点が最大のポイントです。",
 options:[
  {k:"A", t:"1",
   e:"100と180の2行が条件を満たすため、1行ではありません。"},
  {k:"B", t:"0",
   e:"NULL以外で200でない行(100と180)はヒットするため、0行にはなりません。"},
  {k:"C", t:"2",
   e:"正しい。200は条件不一致、NULLは比較結果が不明で除外。残る100と180の2行が検索されます。"},
  {k:"D", t:"3",
   e:"NULL行も含めて3行と考えるのが典型的な誤答です。NULLは <> 200 では取り出せません。"}
 ], correct:["C"]},

  {k:"C", t:"SAL列の値、COMMの値が共に0の社員がいる",

  {k:"D", t:"SELECT COUNT(*) FROM employees WHERE address LIKE '藤沢市%';",

{id:17, cat:"RDB基礎", type:"single",

  {k:"D", t:"WHERE id LIKE '__M%'",

/* ===================== HELPERS ===================== */
function esc(str){
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
/* ゆっくりスクロール(過去問道場スタイル)
   スクロール可能範囲を超えないようにクランプする */
function slowScrollTo(targetY){
  const maxY = Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
  const endY = Math.max(0, Math.min(targetY, maxY));
  const startY = window.pageYOffset;
  const dist = endY - startY;
  if(Math.abs(dist) < 4) return;
  const duration = Math.min(1100, Math.max(450, Math.abs(dist) * 0.9));
  const startTime = performance.now();
  const ease = t => t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2) / 2;
  function step(now){
    const p = Math.min((now - startTime) / duration, 1);
    window.scrollTo(0, startY + dist * ease(p));
    if(p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function scrollToExplain(){
  const exp = document.querySelector(".explain");
  if(!exp) return;
  const y = exp.getBoundingClientRect().top + window.pageYOffset;
  slowScrollTo(y);
}
function beltFor(pct){
  if(pct>=90) return {name:"黒帯 — 免許皆伝", bg:"#1a1a1a", fg:"#e3c583"};
  if(pct>=75) return {name:"茶帯 — 合格圏内", bg:"#6b4a30", fg:"#f7f2e7"};
  if(pct>=60) return {name:"緑帯 — もう少し", bg:"#4f7a4a", fg:"#f7f2e7"};
  if(pct>=40) return {name:"黄帯 — 復習が必要", bg:"#c9a24b", fg:"#231f1c"};
  return {name:"白帯 — 基礎から再確認", bg:"#f7f2e7", fg:"#231f1c"};
}

    <div class="brand">
      <p class="kanji">過去問道場</p>
      <p class="sub">ORACLE BRONZE SQL基礎 — 模擬問題演習</p>
      <hr>
    </div>`;
}

/* ===================== RENDER: QUIZ ===================== */
function currentQ(){ return QUESTIONS.find(q=>q.id===state.order[state.idx]); }

function renderQuiz(){
  const q = currentQ();
  const answered = !!state.answered[q.id];
  const sel = state.answers[q.id] || [];
  const pct = Math.round((state.idx)/state.order.length*100);

  let tableHtml="";
  if(q.table){
    tableHtml = `<div class="qtable-wrap"><table class="qtable"><thead><tr>${q.table.headers.map(h=>`<th>${esc(h)}</th>`).join("")}</tr></thead><tbody>${
      q.table.rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join("")}</tr>`).join("")
    }</tbody></table></div>`;
  }
  let codeHtml = q.code ? `<pre class="qcode">${esc(q.code)}</pre>` : "";

  const optionsHtml = q.options.map(o=>{
    const isSel = sel.includes(o.k);
    const isCorrect = q.correct.includes(o.k);
    let cls="opt";
    if(isSel && !answered) cls+=" selected";
    if(answered){
      cls+=" answered";
      if(isCorrect) cls+=" correct";
      else if(isSel) cls+=" wrong";
    }
    const inputType = q.type==="multi" ? "checkbox" : "radio";
    /* 回答後: 各選択肢の直下に個別解説を表示(過去問道場スタイル) */
    const expHtml = answered
      ? `<span class="opt-exp"><b class="${isCorrect?'judge-ok':'judge-ng'}">${isCorrect?'○':'✕'}</b> ${esc(o.e)}</span>`
      : "";
    return `<label class="${cls}" data-k="${o.k}">
      <input type="${inputType}" name="opt" ${isSel?"checked":""} ${answered?"disabled":""}>
      <span class="opt-body"><span class="k">${o.k}.</span> ${esc(o.t)}${expHtml}</span>
    </label>`;
  }).join("");

  let stampHtml="";
  if(answered){
    const correctSet = q.correct.slice().sort().join(",");
    const selSet = sel.slice().sort().join(",");
    const isOk = correctSet===selSet;
    stampHtml = `<div class="stamp ${isOk?'ok':''}">${isOk?'合':'否'}</div>`;
  }

  /* 冒頭ポイント解説(回答後のみ) */
  const explainHtml = answered
    ? `<div class="explain"><span class="exp-label">解説</span>${esc(q.explain)}</div>`
    : "";

  document.getElementById("app").innerHTML = `
    ${brandHtml()}
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-num">${state.idx+1} / ${state.order.length}</div>
    </div>
    <div class="card">
      ${stampHtml}
      <span class="qcat">${esc(q.cat)}</span>
      <p class="qtitle">問${q.id}. ${esc(q.text)}</p>
      ${tableHtml}
      ${codeHtml}
      ${explainHtml}
      <div class="options">${optionsHtml}</div>
      <div class="actions">
        ${answered
          ? `<button class="btn btn-primary" id="nextBtn">${state.idx+1<state.order.length? "次の問題へ" : "結果を見る"}</button>`
          : `<button class="btn btn-primary" id="submitBtn" disabled>回答する</button>`
        }
        <button class="btn btn-ghost" id="quitBtn">やめる</button>
      </div>
    </div>
  `;

  if(!answered){
    document.querySelectorAll(".opt").forEach(el=>{
      const inp = el.querySelector("input");
      inp.onchange=()=>{
        const k=el.dataset.k;
        if(q.type==="multi"){
          const i=state.selection.indexOf(k);
          if(i>-1) state.selection.splice(i,1); else state.selection.push(k);
        } else {
          state.selection=[k];
        }
        state.answers[q.id]=state.selection.slice();
        renderQuiz();
      };
    });
    document.getElementById("submitBtn").disabled = sel.length===0;
    document.getElementById("submitBtn").onclick=()=>{
      state.answered[q.id]=true;
      renderQuiz();
      /* 再描画の反映を待ってから解説へゆっくりスクロール */
      requestAnimationFrame(()=>requestAnimationFrame(scrollToExplain));
    };
  } else {
    document.getElementById("nextBtn").onclick=()=>{
      state.selection=[];
      if(state.idx+1<state.order.length){ state.idx++; renderQuiz(); window.scrollTo({top:0}); }
      else { state.screen="result"; renderResult(); }
    };
  }
  document.getElementById("quitBtn").onclick=()=>{
    state.screen="start"; renderStart();
  };
}

/* ===================== RENDER: RESULT ===================== */
function renderResult(){
  const total=state.order.length;
  let correctCount=0;
  const catStat={};
  const missed=[];
  state.order.forEach(id=>{
    const q=QUESTIONS.find(x=>x.id===id);
    const sel=(state.answers[id]||[]).slice().sort().join(",");
    const cor=q.correct.slice().sort().join(",");
    const ok = sel===cor;
    if(ok) correctCount++; else missed.push(q);
    if(!catStat[q.cat]) catStat[q.cat]={ok:0,total:0};
    catStat[q.cat].total++;
    if(ok) catStat[q.cat].ok++;
  });
  const pct=Math.round(correctCount/total*100);
  const belt=beltFor(pct);

  const catHtml = Object.entries(catStat).map(([cat,s])=>{
    const p=Math.round(s.ok/s.total*100);
    return `<div class="cat-row">
      <span>${esc(cat)}</span>
      <span class="bar"><i style="width:${p}%"></i></span>
      <span>${s.ok}/${s.total}</span>
    </div>`;
  }).join("");

  const missHtml = missed.length ? `
    <div class="miss-list">
      <p class="qtitle" style="font-size:0.9rem;">間違えた問題</p>
      ${missed.map(q=>`<div class="miss-item" data-id="${q.id}"><span><span class="q">問${q.id}</span> ${esc(q.text.slice(0,26))}${q.text.length>26?'…':''}</span><span>復習する ›</span></div>`).join("")}
    </div>` : `<p style="text-align:center;color:var(--sumi-soft);margin-top:20px;">全問正解です。免許皆伝!</p>`;

  document.getElementById("app").innerHTML = `
    ${brandHtml()}
    <div class="card">
      <p class="score-line">RESULT</p>
      <p class="score-big">${correctCount} / ${total} 問正解</p>
      <div class="belt-wrap">
        <span class="belt-badge" style="background:${belt.bg};color:${belt.fg};">${belt.name}</span>
      </div>
      <div class="cat-list">${catHtml}</div>
      ${missHtml}
      <div class="actions" style="margin-top:24px;">
        <button class="btn btn-primary" id="retryAllBtn">もう一度(全40問)</button>
        ${missed.length? `<button class="btn btn-ghost" id="retryMissBtn">間違えた問題だけ</button>`:""}
      </div>
    </div>
    <div class="footer-note">お疲れさまでした。継続は力なり。</div>
  `;

  document.getElementById("retryAllBtn").onclick=()=>{
    state.order=QUESTIONS.map(q=>q.id);
    if(state.mode==="random") state.order=shuffle(state.order);
    state.idx=0; state.answers={}; state.answered={}; state.selection=[];
    renderQuiz();
  };
  const rmb=document.getElementById("retryMissBtn");
  if(rmb){
    rmb.onclick=()=>{
      state.order=missed.map(q=>q.id);
      state.idx=0; state.answers={}; state.answered={}; state.selection=[];
      renderQuiz();
    };
  }
  document.querySelectorAll(".miss-item").forEach(el=>{
    el.onclick=()=>{
      const id=parseInt(el.dataset.id);
      state.order=[id];
      state.idx=0; state.answers={}; state.answered={}; state.selection=[];
      renderQuiz();
    };
  });
}

/* ===================== INIT ===================== */
renderStart();
</script>
</body>
</html>
